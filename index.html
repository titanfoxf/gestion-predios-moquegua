<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saneamiento Físico Legal - Moquegua</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --primary: #1e272e; --accent: #0fbcf9; --done: #05c46b; --process: #ffdd59; --pending: #ff5e57; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f1f2f6; overflow: hidden; }
        
        /* Panel Lateral Retráctil */
        #sidebar {
            width: 400px; background: var(--primary); color: white; padding: 25px;
            display: flex; flex-direction: column; gap: 20px; z-index: 1001;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5); transition: margin-left 0.3s ease;
            box-sizing: border-box; overflow-y: auto;
        }
        #sidebar.oculto { margin-left: -400px; }

        #map-container { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        #map { flex-grow: 1; }

        /* Botón para ocultar/mostrar panel */
        .toggle-btn {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: var(--primary); color: white; border: none; padding: 10px 15px;
            border-radius: 5px; cursor: pointer; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .toggle-btn:hover { background: var(--accent); }

        /* Selector de Equipos */
        .team-selector { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .team-selector select { width: 100%; padding: 10px; border-radius: 5px; border: none; margin-top: 10px; font-weight: bold; font-size: 14px; cursor: pointer; }

        .search-box { background: #34495e; padding: 15px; border-radius: 10px; }
        .search-box input { width: 100%; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .filter-btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; color: #1e272e; }
        
        /* Estilo del Popup */
        .popup-container { min-width: 250px; color: #2d3436; }
        .popup-title { font-weight: bold; color: var(--primary); border-bottom: 2px solid var(--accent); margin-bottom: 8px; font-size: 14px; padding-bottom: 4px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dotted #ccc; padding-bottom: 2px; }
        .label { font-weight: bold; color: #636e72; font-size: 10px; text-transform: uppercase; }
        .value { font-size: 12px; font-weight: 500; }
        
        .status-box { background: #f1f2f6; padding: 8px; border-radius: 5px; margin-top: 10px; }
        .status-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; font-weight: bold; }

        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        
        /* Créditos del Desarrollador */
        .developer-credit {
            margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center; font-size: 11px; color: #a4b0be; line-height: 1.5;
        }
        .developer-name { color: var(--accent); font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }
        
        /* Personalizar el control de capas */
        .leaflet-control-layers { border-radius: 8px !important; box-shadow: 0 4px 10px rgba(0,0,0,0.2) !important; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
    </style>
</head>
<body>

<div id="loader" class="loading-screen">
    <h2 style="color: var(--accent)">COMPONENTE DE SANEAMIENTO</h2>
    <p>Cargando topografía y datos catastrales...</p>
</div>

<div id="sidebar">
    <div style="text-align: center;">
        <h2 style="margin:0; font-size: 20px;">COMPONENTE SANEAMIENTO</h2>
        <small style="color: var(--accent); letter-spacing: 1px;">CONTROL FÍSICO LEGAL</small>
    </div>

    <div class="team-selector">
        <div style="font-size: 12px; font-weight: bold; color: #dcdde1;">VISUALIZAR AVANCE DE EQUIPO:</div>
        <select id="equipoSelect" onchange="cambiarEquipoActivo()">
            <option value="ESTADO_SINABIP">📊 Equipo SINABIP</option>
            <option value="ESTADO_RD">📊 Equipo RD</option>
            <option value="ESTADO_ITJ">📊 Equipo ITJ</option>
        </select>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar CUS, PE o Propietario...">
        <button onclick="buscarUniversal()" style="width:100%; margin-top:8px; padding:8px; background:var(--accent); border:none; color:white; border-radius:5px; cursor:pointer; font-weight:bold;">BUSCAR</button>
    </div>

    <div class="filter-grid">
        <button class="filter-btn" style="background: #a4b0be; grid-column: span 2;" onclick="filtrarMapa('TODOS')">TODOS (<span id="count-all">-</span>)</button>
        <button class="filter-btn" style="background: var(--done); color: white;" onclick="filtrarMapa('TERMINADO')">TERMINADO (<span id="count-done">-</span>)</button>
        <button class="filter-btn" style="background: var(--process);" onclick="filtrarMapa('PROCESO')">PROCESO (<span id="count-process">-</span>)</button>
        <button class="filter-btn" style="background: var(--pending); color: white;" onclick="filtrarMapa('PENDIENTE')">PENDIENTE (<span id="count-pending">-</span>)</button>
    </div>

    <div class="developer-credit">
        Plataforma GIS Desarrollada por:<br>
        <div class="developer-name">Ing. Fernando Huancapaza Zea</div>
    </div>
</div>

<div id="map-container">
    <button class="toggle-btn" onclick="toggleSidebar()" title="Ocultar/Mostrar Panel">☰</button>
    <div id="map"></div>
</div>

<script>
    // 1. DEFINICIÓN DE MÚLTIPLES MAPAS BASE
    var satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
    var calles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
    var topografia = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });
    var oscuro = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

    // Inicializar mapa con Satélite por defecto
    var map = L.map('map', { center: [-17.193, -70.933], zoom: 16, layers: [satelite] });

    // Añadir control al mapa (esquina superior derecha por defecto)
    var baseMaps = {
        "🛰️ Satélite (ESRI)": satelite,
        "🌙 Mapa Oscuro (Resaltado)": oscuro,
        "⛰️ Topografía (Relieve)": topografia,
        "🗺️ Calles (OSM)": calles
    };
    L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);

    // 2. VARIABLES GLOBALES
    var geojsonLayer;
    var dbExcel = {}; 
    var equipoActivo = "ESTADO_SINABIP";
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTPFK63kpF9SASdx-AXGUSA8UnSNxCpfcJbo6SFsF2s8jvvc3b_cbBEbNgyedsOYOtc1sS3cnI3GE75/pub?output=csv";

    // 3. ESTILOS DINÁMICOS
    function obtenerEstiloPorEquipo(cus) {
        let info = dbExcel[cus];
        let estado = "PENDIENTE";
        if(info && info[equipoActivo]) estado = info[equipoActivo].toUpperCase().trim();
        
        let color = "#ff5e57"; // Rojo
        if (estado === "TERMINADO") color = "#05c46b"; // Verde
        if (estado.includes("PROCESO")) color = "#ffdd59"; // Amarillo

        return { fillColor: color, weight: 1.2, color: 'white', fillOpacity: 0.7 };
    }

    // 4. CARGA DE DATOS DE GOOGLE SHEETS Y GEOJSON
    Papa.parse(sheetURL, {
        download: true, header: true,
        complete: function(results) {
            results.data.forEach(row => {
                if(row.NRO_CUS) dbExcel[row.NRO_CUS.trim()] = row;
            });

            fetch('PoligonosFER.json')
                .then(res => res.json())
                .then(data => {
                    geojsonLayer = L.geoJSON(data, {
                        style: function(f) { return obtenerEstiloPorEquipo(f.properties.NRO_CUS); },
                        onEachFeature: function(f, l) {
                            let c = f.properties.NRO_CUS;
                            let i = dbExcel[c] || {};
                            
                            l.bindPopup(`
                                <div class="popup-container">
                                    <div class="popup-title">CUS: ${c}</div>
                                    <div class="data-row"><span class="label">Partida (PE):</span><span class="value">${i.PE || 'S/N'}</span></div>
                                    <div class="data-row"><span class="label">Sector / MZ / Lote:</span><span class="value">${i.SECTOR || '-'} | ${i.MZ || '-'} | ${i.LOTE || '-'}</span></div>
                                    <div class="data-row" style="border:none; margin-top:5px;"><span class="label">Propietario:</span></div>
                                    <div style="background:#dfe6e9; padding:5px; border-radius:4px; font-size:11px; margin-bottom:5px;">${i.PROPIETARI || 'NO IDENTIFICADO'}</div>
                                    
                                    <div class="status-box">
                                        <div style="text-align:center; font-size:10px; color:#636e72; margin-bottom:4px;">ESTADO POR EQUIPOS</div>
                                        <div class="status-item"><span>SINABIP:</span><span style="color:${getColorText(i.ESTADO_SINABIP)}">${i.ESTADO_SINABIP || 'PENDIENTE'}</span></div>
                                        <div class="status-item"><span>RD:</span><span style="color:${getColorText(i.ESTADO_RD)}">${i.ESTADO_RD || 'PENDIENTE'}</span></div>
                                        <div class="status-item"><span>ITJ:</span><span style="color:${getColorText(i.ESTADO_ITJ)}">${i.ESTADO_ITJ || 'PENDIENTE'}</span></div>
                                    </div>
                                </div>
                            `);
                        }
                    }).addTo(map);
                    
                    actualizarStats();
                    document.getElementById('loader').style.display = 'none';
                });
        }
    });

    function getColorText(estado) {
        if(!estado) return "#d63031";
        estado = estado.toUpperCase().trim();
        if(estado === "TERMINADO") return "#00b894";
        if(estado.includes("PROCESO")) return "#e1b12c";
        return "#d63031";
    }

    // 5. FUNCIONES DE INTERACTIVIDAD
    function cambiarEquipoActivo() {
        equipoActivo = document.getElementById('equipoSelect').value;
        geojsonLayer.eachLayer(function(layer) {
            layer.setStyle(obtenerEstiloPorEquipo(layer.feature.properties.NRO_CUS));
        });
        filtrarMapa('TODOS');
    }

    function toggleSidebar() {
        let sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('oculto');
        setTimeout(() => { map.invalidateSize(); }, 300);
    }

    function filtrarMapa(f) {
        geojsonLayer.eachLayer(l => {
            let info = dbExcel[l.feature.properties.NRO_CUS];
            let est = "PENDIENTE";
            if(info && info[equipoActivo]) est = info[equipoActivo].toUpperCase().trim();
            
            (f === 'TODOS' || est.includes(f)) ? map.addLayer(l) : map.removeLayer(l);
        });
        actualizarStats(); 
    }

    function actualizarStats() {
        let s = { T:0, D:0, P:0, PE:0 };
        geojsonLayer.eachLayer(l => {
            if(map.hasLayer(l)){ // Solo contar los visibles en el mapa
                let info = dbExcel[l.feature.properties.NRO_CUS];
                let e = "PENDIENTE";
                if(info && info[equipoActivo]) e = info[equipoActivo].toUpperCase().trim();
                
                s.T++;
                if(e === "TERMINADO") s.D++; else if(e.includes("PROCESO")) s.P++; else s.PE++;
            }
        });
        document.getElementById('count-all').innerText = s.T;
        document.getElementById('count-done').innerText = s.D;
        document.getElementById('count-process').innerText = s.P;
        document.getElementById('count-pending').innerText = s.PE;
    }

    function buscarUniversal() {
        let v = document.getElementById('searchInput').value.toLowerCase().trim();
        let found = false;
        geojsonLayer.eachLayer(l => {
            let cus = l.feature.properties.NRO_CUS;
            let info = dbExcel[cus] || {};
            let bString = `${cus} ${info.PROPIETARI} ${info.PE} ${info.MZ}`.toLowerCase();
            if(bString.includes(v)) {
                if(!found) { map.fitBounds(l.getBounds()); l.openPopup(); }
                found = true;
            }
        });
        if(!found) alert("No se encontró el predio o partida.");
    }

    document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key === 'Enter') buscarUniversal(); });
</script>
</body>
</html>
