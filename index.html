<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saneamiento Físico Legal - Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-DfzHcLCr.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-B6xCAsPd.css">
</head>
<body>
    <div id="loader" class="loading-screen">
        <div class="loader-spinner"></div>
        <h2 class="loader-title">SANEAMIENTO FÍSICO LEGAL</h2>
        <p id="loader-text">Cargando base de datos y cartografía...</p>
    </div>

    <!-- Barra lateral principal -->
    <div id="sidebar" class="glass-panel">
        <div class="sidebar-header">
            <h2>VISOR SANEAMIENTO</h2>
            <small>EDICIÓN PREMIUM</small>
        </div>

        <div class="tool-section">
            <label class="section-label">Área de Trabajo</label>
            <div class="team-selector">
                <select id="equipoSelect">
                    <option value="SINABIP">Sinabip</option>
                    <option value="RD">Reportes de discrepancia</option>
                    <option value="ITJ">Informes Tecnicos Juridicos</option>
                    <option value="INSPECCION">Inspección de Panel</option>
                    <option value="MASIVO">Búsqueda Masiva</option>
                </select>
            </div>
        </div>

        <div class="tool-section" id="box-busqueda-normal">
            <label class="section-label">Búsqueda Rápida</label>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar CUS o PE...">
                <button id="btnSearch" class="btn-primary">BUSCAR</button>
            </div>
        </div>

        <div class="tool-section hidden" id="box-busqueda-masiva">
            <label class="section-label">Búsqueda Masiva (Pega los CUS)</label>
            <textarea id="batch-input" rows="5" placeholder="Ejemplo:&#10;161467&#10;161638"></textarea>
            <button id="btnBatch" class="btn-primary" style="background:#f59e0b; color:#fff;">PROYECTAR</button>
            <div id="batch-results" style="margin-top:10px; font-size:12px; color:var(--accent);"></div>
        </div>

        <div class="tool-section" id="box-filtros-estado">
            <label class="section-label">Filtros Cartográficos</label>
            <div class="filter-controls">
                <button id="btnFilterAll" class="btn-filter active">TODOS <span id="count-all">0</span></button>
                <button id="btnFilterDone" class="btn-filter done">TERMINADOS <span id="count-done">0</span></button>
                <button id="btnFilterProcess" class="btn-filter process">EN PROCESO <span id="count-process">0</span></button>
                <button id="btnFilterPending" class="btn-filter pending">PENDIENTES <span id="count-pending">0</span></button>
            </div>
        </div>

        <div class="tool-section hidden" id="box-filtros-grupo">
            <label class="section-label">Filtros de Inspección</label>
            <div class="group-tools mb-2">
                <button id="groups-all-btn" class="btn-small action-all">Todas</button>
                <button id="groups-none-btn" class="btn-small action-none">Ninguna</button>
            </div>
            <div id="group-filter-list" class="group-filter-list custom-scroll">
                <!-- Se inyecta checkboxes por grupo aquí -->
            </div>
        </div>

        <div class="tool-section expandable-section">
            <button class="section-label btn-expand" id="offset-toggle">
                Ajuste Fino de Polígonos <span>▼</span>
            </button>
            <div id="offset-panel" class="offset-panel hidden">
                <div class="offset-slider-group">
                    <div class="flex-between"><span>Este (+E / -W)</span> <span id="val-offset-e" class="valor-verde">0.0 m</span></div>
                    <input type="range" id="offset-east" min="-30" max="30" step="0.1" value="0">
                </div>
                <div class="offset-slider-group">
                    <div class="flex-between"><span>Norte (+N / -S)</span> <span id="val-offset-n" class="valor-verde">0.0 m</span></div>
                    <input type="range" id="offset-north" min="-30" max="30" step="0.1" value="0">
                </div>
                <button id="offset-reset" class="btn-secondary w-100">Restablecer a 0.0m</button>
            </div>
        </div>

        <div class="tool-section expandable-section">
            <label class="section-label btn-expand" style="cursor:default">
                Opacidad Polígonos
            </label>
            <div class="offset-slider-group" style="margin-top:10px;">
                <div class="flex-between"><span>Transparencia</span> <span id="val-opacidad" class="valor-verde">100%</span></div>
                <input type="range" id="opacidad-slider" min="10" max="100" step="1" value="100">
            </div>
        </div>

        <div class="developer-credit">
            Platforma GIS por:<br>
            <span class="developer-name">Ing. Fernando Huancapaza Zea</span>
        </div>
    </div>

    <!-- Contenedor del Mapa -->
    <div id="map-container">
        <button id="toggle-sidebar" class="btn-toggle">☰</button>
        
        <div id="floating-controls" class="hidden" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: var(--bg-panel); backdrop-filter: blur(8px); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--glass-border); width: 300px; max-width: 90vw;">
            <div class="flex-between" style="margin-bottom:2px"><span>Calibración E/N</span><button id="f-offset-reset" class="btn-small action-none">Reset</button></div>
            <div style="display:flex; gap:10px;">
                <input type="range" id="f-offset-east" min="-30" max="30" step="0.1" value="0" style="width:100%" title="Este/Oeste">
                <input type="range" id="f-offset-north" min="-30" max="30" step="0.1" value="0" style="width:100%" title="Norte/Sur">
            </div>
            <div class="flex-between" style="margin-top:6px; margin-bottom:2px;"><span>Transparencia</span><span id="val-f-opacidad" class="valor-verde">100%</span></div>
            <input type="range" id="f-opacidad-slider" min="10" max="100" step="1" value="100" style="width:100%">
        </div>

        <div id="map"></div>
    </div>
    
    <!-- Modal de Detalles del Predio -->
    <div id="property-modal" class="glass-modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Detalles del Predio</h3>
                <button id="btn-close-modal" class="btn-close">×</button>
            </div>
            <div class="modal-body custom-scroll" id="modal-body-content">
                <!-- Data inyectada por JS -->
            </div>
        </div>
    </div>

</body>
</html>
